    let proxyActive = false;
    let currentLanguage = 'en';
    let fakeResolverCount = 7;
    let tooltipElement = null;
    let logQueue = [];
    let isProcessing = false;

    // المانها
    const globeContainer = document.getElementById('globeBtn');

    const resolverCountSpan = document.getElementById('resolverCount');

    const websiteDivs = [document.getElementById('web1'), document.getElementById('web2'), document.getElementById('web3')];

    // لیست وبسایت‌های معروف
    const websitesList = [
        "youtube.com", "google.com", "github.com", "openai.com", "netflix.com",
        "twitter.com", "instagram.com", "spotify.com", "telegram.org", "discord.com",

    ];

    // لاگ‌های واقعی از فایل متنی AyVPN-DNS Log.txt
    const realLogs = [
        "[AyVPN-DNS Client] [INFO] ============================================================",
        "[AyVPN-DNS Client] [INFO] GitHub: https://github.com/AyTechnic/AyVPN-DNS",
        "[AyVPN-DNS Client] [INFO] Telegram: @AyVPN-DNS",

        "[AyVPN-DNS Client] [INFO] 🚀 AyVPN-DNS Client Started",

        "[AyVPN-DNS Client] [WARN] ❌ Rejected (1/443): shammay.ir via 185.24.255.80:53 | reason=UPLOAD_MTU",
        "[AyVPN-DNS Client] [WARN] ❌ Rejected (2/443): shammay.ir via 185.192.113.26:53 | reason=UPLOAD_MTU",
        "[AyVPN-DNS Client] [INFO] ✅ Accepted (422/443): shammay.ir via 185.208.76.104:53 | upload=66 | download=990",
        "[AyVPN-DNS Client] [INFO] ✅ Session Initialized Successfully (ID: 70)",
        "[AyVPN-DNS Client] [INFO] 📡 Async Runtime Initialized: 4 RX/TX Workers, 5 Processors",
        "[AyVPN-DNS Client] [INFO] 🚀 SOCKS5 Proxy server is listening on 127.0.0.1:18000",
        "[AyVPN-DNS Client] [INFO] 🔄 DNS server 109.230.83.155:53 re-activated after successful recheck. | Active Resolvers: 8",
        "[AyVPN-DNS Client] [INFO] 🔌 New SOCKS5 TCP CONNECT to gator.volces.com:443, Stream ID: 1",
        "[AyVPN-DNS Client] [INFO] 🔌 New SOCKS5 TCP CONNECT to www.youtube.com:443, Stream ID: 2",

        "[AyVPN-DNS Client] [INFO] 🔌 New SOCKS5 TCP CONNECT to www.wildlink.me:443, Stream ID: 4",
        "[AyVPN-DNS Client] [INFO] 🔌 New SOCKS5 TCP CONNECT to check-host.net:443, Stream ID: 5",
        "[AyVPN-DNS Client] [INFO] 🔌 New SOCKS5 TCP CONNECT to fonts.gstatic.com:443, Stream ID: 8",
        "[AyVPN-DNS Client] [INFO] 🔌 New SOCKS5 TCP CONNECT to cdn.jsdelivr.net:443, Stream ID: 9",
        "[AyVPN-DNS Client] [INFO] Global MTU Configuration -> Upload: 49, Download: 562",
        "[AyVPN-DNS Client] [INFO] Total valid resolvers after MTU testing: 7 of 443"
    ];

    // تشخیص نوع لاگ بر اساس متن
    function getLogType(text) {
        if (text.includes('✅') || text.includes('Success') || text.includes('success') || text.includes('Accepted')) return 'success';
        if (text.includes('❌') || text.includes('ERROR') || text.includes('error') || text.includes('Rejected')) return 'error';
        if (text.includes('WARN') || text.includes('⚠')) return 'warning';
        if (text.includes('Resolver') || text.includes('resolver') || text.includes('DNS')) return 'resolver';
        return 'info';
    }

    // اضافه کردن لاگ به صف و پردازش با سرعت بالا بدون اسکرول
    function addLog(text, type = null) {
        const finalType = type || getLogType(text);
        logQueue.push({ text, type: finalType });
        processLogQueue();
    }

    let lastProcessTime = 0;
    const PROCESS_INTERVAL = 80; // میلی‌ثانیه - سرعت بالای نمایش لاگ‌ها

    function processLogQueue() {
        if (isProcessing) return;
        isProcessing = true;
        
        function processNext() {
            const now = Date.now();
            if (now - lastProcessTime < PROCESS_INTERVAL) {
                setTimeout(processNext, PROCESS_INTERVAL - (now - lastProcessTime));
                return;
            }
            
            if (logQueue.length === 0) {
                isProcessing = false;
                return;
            }
            
            const entry = logQueue.shift();
            const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const logDiv = document.createElement('div');
            logDiv.className = `log-line ${entry.type}`;
            // حذف تگ‌های [INFO] و غیره برای خوانایی بهتر
            let displayText = entry.text.replace(/\[AyVPN-DNS Client\]\s*\[\w+\]\s*/, '');
            logDiv.innerHTML = `[${time}] ${displayText}`;
            logContent.appendChild(logDiv);
            
            // محدود کردن تعداد خطوط لاگ به 250 خط (حذف قدیمی‌ها از بالا)
            while (logContent.children.length > 250) {
                logContent.removeChild(logContent.firstChild);
            }
            
            lastProcessTime = now;
            setTimeout(processNext, 20); // فاصله کم بین هر لاگ برای سرعت بالا
        }
        
        processNext();
    }

    // تولید لاگ‌های مداوم و سریع از فایل واقعی
    let currentLogIndex = 0;
    function generatePeriodicLog() {
        if (isConnected) {
            // در حالت اتصال، لاگ‌های واقعی را با سرعت بالا نمایش بده
            addLog(realLogs[currentLogIndex % realLogs.length]);
            currentLogIndex++;
        } else {
            const idleMsgs = [
                "⚡ Idle: VPN tunnel disconnected. Click globe to connect.",
                "⏳ Waiting for connection...",
                "🔌 Proxy server ready but inactive",
                "📡 No active resolvers - start VPN"
            ];
            addLog(idleMsgs[Math.floor(Math.random() * idleMsgs.length)], "warning");
        }
    }

    // به روز رسانی تعداد ریزالورها
    function updateResolverCount() {
        if (isConnected) {
            fakeResolverCount = Math.floor(Math.random() * 30) + 4;
            resolverCountSpan.style.color = "#50fa7b";
        } else {
            fakeResolverCount = Math.floor(Math.random() * 4);
            resolverCountSpan.style.color = "#ffb86c";
        }
        resolverCountSpan.innerText = fakeResolverCount;
    }

    // چرخش وبسایت‌ها
    function rotateWebsites() {
        if(isConnected) {
            for(let i=0; i<websiteDivs.length; i++) {
                let rand = Math.floor(Math.random() * websitesList.length);
                websiteDivs[i].innerText = websitesList[rand];
            }
        } else {
            websiteDivs[0].innerText = "offline mode";
            websiteDivs[1].innerText = "connect VPN";
            websiteDivs[2].innerText = "---";
        }
    }

    // رنگ شمای
    function updateShammayColor() {
        const hue = (Date.now() / 45) % 360;
        const r = Math.floor(128 + 127 * Math.sin(hue * Math.PI / 180));
        const g = Math.floor(128 + 127 * Math.sin((hue + 120) * Math.PI / 180));
        const b = Math.floor(128 + 127 * Math.sin((hue + 240) * Math.PI / 180));
        shammayGlow.style.color = `rgb(${r}, ${g}, ${b})`;
        shammayGlow.style.textShadow = `0 0 14px rgb(${r}, ${g}, ${b})`;
        shammayGlow.style.borderColor = `rgb(${r}, ${g}, ${b})`;
    }

    // تولتیپ وسط کره
    function showCenterTooltip(text) {
        if(tooltipElement) tooltipElement.remove();
        tooltipElement = document.createElement('div');
        tooltipElement.className = 'globe-tooltip-center';
        tooltipElement.innerText = text;
        document.body.appendChild(tooltipElement);
        const rect = globeContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        tooltipElement.style.left = `${centerX}px`;
        tooltipElement.style.top = `${centerY}px`;
    }

    function hideCenterTooltip() {
        if(tooltipElement) {
            tooltipElement.remove();
            tooltipElement = null;
        }
    }

    // اتصال/قطع
    function toggleConnection() {
        isConnected = !isConnected;
        if(isConnected) {
            globeContainer.classList.add('rotating');
            successCircle.classList.add('active');
            addLog("✅ VPN Session Active! Tunnel established. Resolvers: 7 active", "success");
            addLog("SOCKS5 Proxy server listening on 127.0.0.1:18000", "info");
            addLog("Async Runtime Initialized: 4 RX/TX Workers, 5 Processors", "success");
        } else {
            globeContainer.classList.remove('rotating');
            successCircle.classList.remove('active');
            addLog("VPN disconnected by user. Session terminated.", "warning");
            addLog("All resolvers released. Proxy disabled.", "info");
        }
        updateResolverCount();
        rotateWebsites();
    }

    // پروکسی
    function toggleProxySimulate() {
        proxyActive = !proxyActive;
        if(proxyActive) {
            proxyToggleBtn.classList.add('active');
            proxyToggleTextSpan.innerText = currentLanguage === 'en' ? "Proxy ON" : "پروکسی فعال";
            addLog("System proxy enabled → 127.0.0.1:18000 (SOCKS5)", "success");
        } else {
            proxyToggleBtn.classList.remove('active');
            proxyToggleTextSpan.innerText = currentLanguage === 'en' ? "Proxy OFF" : "پروکسی غیرفعال";
            addLog("System proxy disabled", "info");
        }
    }

    // زبان
    function toggleLanguage() {
        currentLanguage = currentLanguage === 'en' ? 'fa' : 'en';
        const proxyText = document.getElementById('proxyToggleText');
        const subEl = document.getElementById('subText');
        const resolverLabelSpan = document.getElementById('resolverLabel');
        if(currentLanguage === 'fa') {
            subEl.innerText = "تونل امن DNS";
            proxyText.innerText = proxyActive ? "پروکسی فعال" : "پروکسی غیرفعال";
            resolverLabelSpan.innerHTML = "ریزالورها<br>فعال";
            document.querySelectorAll('.card-header span').forEach(span => {
                if(span.innerText === "DOMAINS") span.innerText = "آدرس سرور";
                if(span.innerText === "ENCRYPTION KEY") span.innerText = "کلید رمزنگاری";
                if(span.innerText === "PROXY SETTINGS") span.innerText = "تنظیمات پروکسی";
            });
        } else {
            subEl.innerText = "Secure DNS Tunnel VPN";
            proxyText.innerText = proxyActive ? "Proxy ON" : "Proxy OFF";
            resolverLabelSpan.innerHTML = "Active<br>Resolvers";
            document.querySelectorAll('.card-header span').forEach(span => {
                if(span.innerText === "آدرس سرور") span.innerText = "DOMAINS";
                if(span.innerText === "کلید رمزنگاری") span.innerText = "ENCRYPTION KEY";
                if(span.innerText === "تنظیمات پروکسی") span.innerText = "PROXY SETTINGS";
            });
        }
    }

    function notify(title, msg) { alert(`${title}\n${msg}`); }

    // رویدادها
    globeContainer.addEventListener('mouseenter', () => {
        const tip = isConnected ? (currentLanguage === 'en' ? "Connected" : "متصل است") : (currentLanguage === 'en' ? "Connect" : "اتصال");
        showCenterTooltip(tip);
    });
    globeContainer.addEventListener('mouseleave', hideCenterTooltip);
    globeContainer.addEventListener('click', toggleConnection);
    proxyToggleBtn.addEventListener('click', toggleProxySimulate);
    langBtn.addEventListener('click', toggleLanguage);
    userInfoBtn.addEventListener('click', () => notify("Subscription Info", "User: shammay | Volume: Unlimited | Active Users: 2"));
    settingsBtn.addEventListener('click', () => notify("Advanced Settings", "MTU, ARQ, DNS, Compression panels"));
    resolversBtn.addEventListener('click', () => notify("Edit Resolvers", "8.8.8.8:53\n1.1.1.1:53\n185.208.76.104:53"));
    updateResolversBtn.addEventListener('click', () => {
        addLog("Fetching latest resolvers from remote CDN...", "info");
        setTimeout(() => {
            addLog("Resolvers list updated: 12 active entries added", "success");
        }, 1200);
    });
    document.getElementById('logoClick')?.addEventListener('click', () => window.open("https://shammay.ir", "_blank"));
    document.getElementById('titleClick')?.addEventListener('click', () => window.open("https://shammay.ir", "_blank"));

    // تایمرها با فواصل کوتاه‌تر برای سرعت بیشتر
    setInterval(updateResolverCount, 2000);
    setInterval(rotateWebsites, 2800);
    setInterval(() => generatePeriodicLog(), 2200); // سرعت بالای نمایش لاگ‌ها
    setInterval(updateShammayColor, 130);

    // مقداردهی اولیه
    (function init() {
        addLog("AyVPN-DNS Client Started | Build: v2026.05.01-1.0.0", "info");
        addLog("Loaded Resolvers: 443 endpoints.", "resolver");
        addLog("MTU Testing parallel=200...", "info");
        addLog("Global MTU Configuration -> Upload: 49, Download: 562", "info");
        addLog("AyVPN-DNS Ready — Click Earth to start secure tunnel", "success");
        updateResolverCount();
        rotateWebsites();
        updateShammayColor();
    })();
</script>
</body>
</html>
